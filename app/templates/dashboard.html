<!doctype html>
<html lang="pt-BR" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Buscador de Precos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body class="min-h-full bg-zinc-950 text-zinc-100">
    <main class="mx-auto flex min-h-screen w-full max-w-7xl flex-col gap-6 px-4 py-5 sm:px-6 lg:px-8">
      <header class="flex flex-col gap-4 border-b border-zinc-800 pb-5 md:flex-row md:items-end md:justify-between">
        <div>
          <h1 class="text-2xl font-semibold tracking-normal text-white">Buscador e Monitorador de Precos</h1>
          <p class="mt-1 max-w-2xl text-sm text-zinc-400">Busca estrita por produto exato, ranking por preco total, cupons, historico e alertas.</p>
        </div>
        <button id="theme-toggle" class="rounded-md border border-zinc-700 px-3 py-2 text-sm text-zinc-200 hover:bg-zinc-900">Tema</button>
      </header>

      <section class="grid gap-5 lg:grid-cols-[1fr_320px]">
        <div class="rounded-lg border border-zinc-800 bg-zinc-900/70 p-4">
          <form
            class="flex flex-col gap-3 md:flex-row"
            hx-post="/ui/search"
            hx-target="#results"
            hx-indicator="#loading"
          >
            <input
              name="query"
              required
              minlength="3"
              placeholder="Ex.: iPhone 16 Pro Max 512GB Titanio Natural"
              class="min-h-11 flex-1 rounded-md border border-zinc-700 bg-zinc-950 px-3 text-sm text-white outline-none ring-cyan-500 focus:ring-2"
            />
            <button class="min-h-11 rounded-md bg-cyan-500 px-5 text-sm font-semibold text-zinc-950 hover:bg-cyan-400">Buscar exato</button>
          </form>
          <div id="loading" class="htmx-indicator mt-3 text-sm text-cyan-300">Coletando ofertas nas lojas...</div>
        </div>

        <aside class="rounded-lg border border-zinc-800 bg-zinc-900/70 p-4">
          <h2 class="text-sm font-semibold text-zinc-100">Criar alerta</h2>
          <form class="mt-3 grid gap-2" id="alert-form">
            <input name="query" placeholder="Produto" class="rounded-md border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm" />
            <input name="target_price" placeholder="Preco alvo" type="number" step="0.01" class="rounded-md border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm" />
            <input name="email" placeholder="Email" type="email" class="rounded-md border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm" />
            <input name="telegram_chat_id" placeholder="Telegram chat ID" class="rounded-md border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm" />
            <button type="submit" class="rounded-md border border-cyan-500 px-3 py-2 text-sm text-cyan-200 hover:bg-cyan-950">Salvar alerta</button>
          </form>
          <p id="alert-status" class="mt-2 text-xs text-zinc-400"></p>
        </aside>
      </section>

      <section id="results" class="min-h-64">
        {% include "partials/offers.html" %}
      </section>
    </main>
    <script>
      document.getElementById("theme-toggle").addEventListener("click", () => {
        document.body.classList.toggle("light");
      });
      document.getElementById("alert-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const form = event.currentTarget;
        const data = Object.fromEntries(new FormData(form).entries());
        Object.keys(data).forEach((key) => data[key] === "" && delete data[key]);
        data.target_price = Number(data.target_price);
        const response = await fetch("/api/alerts", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(data),
        });
        document.getElementById("alert-status").textContent = response.ok ? "Alerta salvo." : "Nao foi possivel salvar o alerta.";
        if (response.ok) form.reset();
      });
    </script>
  </body>
</html>
